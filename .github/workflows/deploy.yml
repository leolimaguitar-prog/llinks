name: Deploy VPS

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Build
        run: |
          npm install
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Validate Secrets
        run: |
          check_secret() {
            local name=$1
            local value=$2
            if [ -z "$value" ]; then
              echo "Error: $name secret is not set."
              exit 1
            fi
            # Permite quebras de linha apenas na chave SSH
            if [ "$name" != "VPS_SSH_KEY" ]; then
              if echo "$value" | grep -q "[[:space:]]"; then
                echo "Error: $name secret contains whitespace or newlines. Please clean it in GitHub Settings."
                exit 1
              fi
            else
              # Para a chave SSH, apenas verifica se há espaços/newlines ANTES ou DEPOIS do bloco BEGIN/END
              if [[ "$value" =~ ^[[:space:]]+ ]] || [[ "$value" =~ [[:space:]]+$ ]]; then
                echo "Error: $name secret contains leading or trailing whitespace. Please clean it in GitHub Settings."
                exit 1
              fi
            fi
          }
          check_secret "VPS_IP" "${{ secrets.VPS_IP }}"
          check_secret "VPS_USER" "${{ secrets.VPS_USER }}"
          check_secret "VPS_SSH_KEY" "${{ secrets.VPS_SSH_KEY }}"

      - name: Test Connection
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=5 ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} "echo '✅ Connection Successful'" || (echo "❌ SSH Connection failed. Please check VPS_SSH_KEY and authorized_keys on server." && exit 1)

      - name: Deploy para VPS
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          ARGS: "-avzr --delete"
          SOURCE: "dist/"
          REMOTE_HOST: ${{ secrets.VPS_IP }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          TARGET: "/etc/icontainer/apps/openresty/openresty/www/sites/linkinstagram.leolima.digital/"
